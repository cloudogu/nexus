file:
  /opt/sonatype/nexus:
    exists: true
    owner: nexus
    group: nexus
    filetype: directory
    contains: []
  /startup.sh:
    exists: true
    owner: nexus
    group: nexus
    filetype: file
    contains: []
  /pre-upgrade.sh:
    exists: true
    owner: root
    group: root
    filetype: file
    contains: []
  /var/lib/nexus:
    exists: true
    owner: nexus
    group: nexus
    filetype: directory
    contains: []
  /var/lib/migration:
    exists: true
    filetype: directory
    contains: []
  /usr/bin/nexus-claim:
    exists: true
    filetype: file
  /usr/bin/nexus-carp:
    exists: true
    filetype: file
  /opt/sonatype/nexus/bin/nexus.vmoptions:
    exists: true
    mode: "0770"
    owner: nexus
    group: nexus
    filetype: file
    contains: []
user:
  nexus:
    exists: true
    uid: 1000
    gid: 1000
    groups:
    - nexus
    home: /var/lib/nexus
    shell: /bin/bash
group:
  nexus:
    exists: true
    gid: 1000
process:
  nexus-carp:
    running: true
  tini:
    running: true
port:
  tcp:8081:
    listening: true
package:
  maven:
    installed: false
#Single node sets the permissions to 755, while Multi node sets it to a 775 because of scaling needs.
command:
  stat -c '%a' /var/lib/nexus | sed 's/^.*\(.\{3\}\)$/\1/' | grep -qE '^(775|755)$':
    exit-status: 0
